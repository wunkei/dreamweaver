<svg width="360" height="360" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
  <style>
    .px { shape-rendering: crispEdges; }
    .eye {
      transform-box: fill-box;
      transform-origin: center;
      animation: blink 4.2s infinite;
    }
    @keyframes blink {
      0%, 44%, 48%, 100% { transform: scaleY(1); }
      46% { transform: scaleY(0.08); }
    }
  </style>

  <!-- Head -->
  <rect class="px" x="108" y="36" width="144" height="126" fill="#f2c6a0"/>
  <rect class="px" x="126" y="18" width="108" height="36" fill="#2f3136"/>
  <rect class="px" x="108" y="36" width="18" height="18" fill="#2f3136"/>
  <rect class="px" x="234" y="36" width="18" height="18" fill="#2f3136"/>

  <!-- Eyes -->
  <rect class="px eye" x="144" y="90" width="18" height="18" rx="2" fill="#1d1f23"/>
  <rect class="px eye" x="198" y="90" width="18" height="18" rx="2" fill="#1d1f23"/>
  <rect class="px" x="162" y="126" width="36" height="9" fill="#d28b74"/>

  <!-- Neck -->
  <rect class="px" x="162" y="162" width="36" height="18" fill="#e9b998"/>

  <!-- Torso -->
  <rect class="px" x="117" y="180" width="126" height="108" fill="#1f88e5"/>
  <rect class="px" x="162" y="180" width="36" height="108" fill="#2fa5ff"/>
  <rect class="px" x="153" y="207" width="54" height="18" fill="#4ec9b0"/>

  <!-- Arms -->
  <rect class="px" x="72" y="189" width="45" height="90" fill="#1f88e5"/>
  <rect class="px" x="243" y="189" width="45" height="90" fill="#1f88e5"/>
  <rect class="px" x="63" y="270" width="54" height="27" fill="#f2c6a0"/>
  <rect class="px" x="243" y="270" width="54" height="27" fill="#f2c6a0"/>

  <!-- Legs -->
  <rect class="px" x="126" y="288" width="36" height="54" fill="#3d4a5a"/>
  <rect class="px" x="198" y="288" width="36" height="54" fill="#3d4a5a"/>
  <rect class="px" x="117" y="333" width="54" height="18" fill="#1d1f23"/>
  <rect class="px" x="189" y="333" width="54" height="18" fill="#1d1f23"/>
</svg>

<body>

<div class="music-widget" aria-label="背景音乐">
    <span class="music-disc" aria-hidden="true" style="cursor: pointer; user-select: none; margin-right: 8px;">🎵</span>
    <span class="music-name">bgm.mp3</span>
</div>
<audio id="bgm-audio" autoplay loop preload="auto">
    <source src="../media/BabyShark.mp3" type="audio/mpeg">
</audio>

<header>

</header>

<nav>
    <a href="../index.html">首页</a>

<div class="container">
    <h2>联系我</h2>
    <p>无论你想交流开发实践、系统部署，还是聊聊兴趣方向，都欢迎联系我。</p>
    <div class="info-box">
        <p><strong>Location:</strong> 四川大学 (Sichuan University)</p>
        <p><strong>Email:</strong> <code>wynn.cs.dev@example.com</code></p>

</div>

<footer>
    <p>&copy; 2026 Wynn. Code compiled smoothly. 设计于 Dreamweaver.</p>
</footer>

<script>
(function () {
    var bgm = document.getElementById("bgm-audio");
    function tryPlayBgm() {
        if (!bgm) return;
        bgm.play().catch(function () {});
    }
    tryPlayBgm();
    document.addEventListener("pointerdown", tryPlayBgm, { once: true });
})();

</script>
<script>
    const audioSource = document.querySelector('#bgm-audio source');
    const fullPath = audioSource.getAttribute('src');
    const fileName = decodeURIComponent(fullPath.split('/').pop());
    document.querySelector('.music-name').textContent = fileName;

    const musicDisc = document.querySelector('.music-disc');
    const audioPlayer = document.getElementById('bgm-audio');

    audioPlayer.addEventListener('play', function() { 
        musicDisc.textContent = '⏸ ';
    });
    audioPlayer.addEventListener('pause', function() { 
        musicDisc.textContent = '▶ ';
    });

    musicDisc.textContent = audioPlayer.paused ? '▶ ' : '⏸ ';

    musicDisc.addEventListener('click', function() {
        if (audioPlayer.paused) {
            audioPlayer.play();
        } else {
            audioPlayer.pause();
        }
    });
</script>
</body>
</html>
